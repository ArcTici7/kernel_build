name: Build Xiaomi Miatoll Kernel (UAC2 Enabled)

on:
  workflow_dispatch:

env:
  # Fix Node.js 20 deprecation - opt into Node.js 24 now [citation:1][citation:5][citation:9]
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        repository: ProjectVelvet/kernel_xiaomi_sm6250
        ref: non-ksu
        path: kernel

    - name: Checkout AnyKernel3
      uses: actions/checkout@v4
      with:
        repository: osm0sis/AnyKernel3
        path: anykernel

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex gcc-multilib g++-multilib git gnupg gperf libxml2-utils lzop pngcrush schedtool squashfs-tools xsltproc zip zlib1g-dev libssl-dev

    - name: Get Clang (Prebuilt)
      run: |
        mkdir -p toolchains/clang
        cd toolchains/clang
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r29/clang-14.0.7.tar.gz
        tar -xf clang-14.0.7.tar.gz
        rm clang-14.0.7.tar.gz

    - name: Get 32-bit ARM GCC (LIVE mirror from LineageOS)
      run: |
        mkdir -p toolchains/gcc32
        cd toolchains/gcc32
        wget -q https://mirror.math.princeton.edu/pub/lineageos/prebuilt_tools/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9.tar.xz
        tar -xf arm-linux-androideabi-4.9.tar.xz
        rm arm-linux-androideabi-4.9.tar.xz

    - name: Get 64-bit ARM GCC (Live mirror)
      run: |
        mkdir -p toolchains/gcc64
        cd toolchains/gcc64
        wget -q https://mirror.math.princeton.edu/pub/lineageos/prebuilt_tools/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9.tar.xz
        tar -xf aarch64-linux-android-4.9.tar.xz
        rm aarch64-linux-android-4.9.tar.xz

    - name: Fix PRIME_CPU_MASK infinite loop & Enable UAC2 Audio
      working-directory: ./kernel
      run: |
        # Fix the broken empty CPU mask (causes infinite prompt)
        sed -i 's/^CONFIG_PRIME_CPU_MASK=""/CONFIG_PRIME_CPU_MASK="0"/g' arch/arm64/configs/vendor/miatoll-stock_defconfig

        # Inject USB gadget audio flags
        echo "CONFIG_USB_CONFIGFS_F_UAC2=y" >> arch/arm64/configs/vendor/miatoll-stock_defconfig
        echo "CONFIG_USB_CONFIGFS_F_UAC1=y" >> arch/arm64/configs/vendor/miatoll-stock_defconfig
        echo "CONFIG_USB_G_AUDIO=y" >> arch/arm64/configs/vendor/miatoll-stock_defconfig

        # Generate non-interactive .config
        make ARCH=arm64 olddefconfig CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- O=out

    - name: Build Kernel
      working-directory: ./kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc64/bin:$GITHUB_WORKSPACE/toolchains/gcc32/bin:$PATH"
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-

        make O=out ARCH=arm64 vendor/miatoll-stock_defconfig

        # Double-check UAC2 flags are present (safety)
        scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_UAC2
        scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_UAC1
        scripts/config --file out/.config --enable CONFIG_USB_G_AUDIO

        make O=out ARCH=arm64 olddefconfig

        # Build the kernel (use all cores)
        make -j$(nproc) O=out ARCH=arm64 Image.gz dtbo.img

    - name: Prepare AnyKernel3 Package
      run: |
        cp kernel/out/arch/arm64/boot/Image.gz anykernel/
        cp kernel/out/arch/arm64/boot/dtbo.img anykernel/
        if [ -f kernel/out/arch/arm64/boot/dtb.img ]; then
          cp kernel/out/arch/arm64/boot/dtb.img anykernel/
        fi
        cd anykernel
        zip -r9 ../Xiaomi_Miatoll_Kernel_UAC2_$(date +%Y%m%d_%H%M).zip * -x .git README.md

    - name: Upload Kernel Zip
      uses: actions/upload-artifact@v4
      with:
        name: Xiaomi_Miatoll_Kernel_UAC2
        path: Xiaomi_Miatoll_Kernel_UAC2_*.zip
