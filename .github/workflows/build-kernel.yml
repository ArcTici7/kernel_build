name: Build Xiaomi Miatoll Kernel (UAC2 Enabled)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        repository: ProjectVelvet/kernel_xiaomi_sm6250
        ref: non-ksu
        path: kernel

    - name: Checkout AnyKernel3
      uses: actions/checkout@v4
      with:
        repository: osm0sis/AnyKernel3
        path: anykernel

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex gcc-multilib g++-multilib git gnupg gperf libxml2-utils lzop pngcrush schedtool squashfs-tools xsltproc zip zlib1g-dev libssl-dev

    - name: Get Proton Clang (kdrag0n - Stable r522817)
      run: |
        mkdir -p toolchains/clang
        cd toolchains/clang
        curl -L -o clang.tar.gz https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz
        tar -xzf clang.tar.gz --strip-components=1
        rm clang.tar.gz
        chmod +x bin/*

    - name: Get 64-bit ARM GCC (LineageOS 19.1)
      run: |
        mkdir -p toolchains/gcc64
        cd toolchains/gcc64
        curl -L -o gcc64.tar.gz https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9/archive/refs/heads/lineage-19.1.tar.gz
        tar -xzf gcc64.tar.gz --strip-components=1
        rm gcc64.tar.gz

    - name: Get 32-bit ARM GCC (LineageOS 19.1)
      run: |
        mkdir -p toolchains/gcc32
        cd toolchains/gcc32
        curl -L -o gcc32.tar.gz https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9/archive/refs/heads/lineage-19.1.tar.gz
        tar -xzf gcc32.tar.gz --strip-components=1
        rm gcc32.tar.gz

    - name: Fix PRIME_CPU_MASK infinite loop & Enable UAC2 Audio
      working-directory: ./kernel
      run: |
        # Fix the broken empty CPU mask (causes infinite prompt loop)
        sed -i 's/^CONFIG_PRIME_CPU_MASK=""/CONFIG_PRIME_CPU_MASK="0"/g' arch/arm64/configs/vendor/miatoll-stock_defconfig

        # Enable USB Gadget Audio (UAC2/UAC1)
        cat >> arch/arm64/configs/vendor/miatoll-stock_defconfig << 'EOF'
CONFIG_USB_CONFIGFS_F_UAC2=y
CONFIG_USB_CONFIGFS_F_UAC1=y
CONFIG_USB_G_AUDIO=y
EOF

    - name: Build Kernel
      working-directory: ./kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc64/bin:$GITHUB_WORKSPACE/toolchains/gcc32/bin:$PATH"
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        
        # Verify toolchains are working
        echo "=== Toolchain Verification ==="
        clang --version | head -n1
        ${CROSS_COMPILE}gcc --version | head -n1
        ${CROSS_COMPILE_ARM32}gcc --version | head -n1
        echo "=============================="
        
        # Generate defconfig
        make O=out ARCH=arm64 vendor/miatoll-stock_defconfig
        
        # Ensure UAC2 flags survive olddefconfig
        make O=out ARCH=arm64 olddefconfig
        
        # Verify UAC2 flags are set
        grep -E "CONFIG_USB_CONFIGFS_F_UAC[12]|CONFIG_USB_G_AUDIO" out/.config || echo "WARNING: UAC2 flags missing"
        
        # Build kernel
        make -j$(nproc) O=out ARCH=arm64 Image.gz dtbo.img

    - name: Package AnyKernel3 Zip
      run: |
        # Copy kernel images
        cp kernel/out/arch/arm64/boot/Image.gz anykernel/
        cp kernel/out/arch/arm64/boot/dtbo.img anykernel/
        
        # Copy dtb.img if it exists
        [ -f kernel/out/arch/arm64/boot/dtb.img ] && cp kernel/out/arch/arm64/boot/dtb.img anykernel/
        
        # Create zip
        cd anykernel
        zip -r9 ../Xiaomi_Miatoll_UAC2_$(date +%Y%m%d-%H%M%S).zip * -x .git README.md .gitignore
        
        echo "✅ Package created successfully"

    - name: Upload Kernel Zip
      uses: actions/upload-artifact@v4
      with:
        name: Xiaomi-Miatoll-Kernel-UAC2
        path: Xiaomi_Miatoll_UAC2_*.zip
        compression-level: 0
